defaults:
  - _self_
  - rlbench_task@_global_: reach_target
  - override hydra/launcher: submitit_local

# task settings
frame_stack: 8
action_repeat: 1
discount: 0.99
# train settings
num_seed_frames: 0
# eval
eval_every_frames: 2500
num_eval_episodes: 25
# snapshot
save_snapshot: false
# replay buffer
replay_buffer_size: 1000000
nstep: 1
batch_size: 256
use_relabeling: true
online_buffer: true
# misc
seed: 1
device: cuda
save_video: true
save_train_video: false
use_tb: true
use_wandb: true
# experiment
experiment: exp
# agent
lr: 5e-5
weight_decay: 0.1
feature_dim: 64
do_always_bootstrap: false # setting to True can sometimes work better
num_update_steps: 1
# environment
arm_max_velocity: 2.0
arm_max_acceleration: 8.0

agent:
  _target_: arsq_rlb.alg.sqar.SQARAgent
  device: ${device}
  lr: ${lr}
  weight_decay: ${weight_decay}
  critic_target_tau: 0.02
  update_every_steps: 1
  num_expl_steps: 0
  feature_dim: ${feature_dim}
  hidden_dim: 512
  levels: 3
  bins: 5

  # all
  soft_alpha: 0.001
  act_alpha: ${agent.soft_alpha}
  qchunk_size: -1 # -1
  abl_skip: -1

  # bellman-q
  bellman_loss_coef: 0.1 # critic_lambda 0.1

  # bellman-cql
  cql_type: "margin" # cql / distance, margin
  cql_min_q_weight: 1 # bc_lambda 1.0
  cql_clip_diff_min: -0.01 # bc_margin 0.01
  cql_clip_diff_max: 10000000
  cql_temp: 1.0

wandb:
  project: arsq_rlb
  name: sqar_v4-${task_name_short}-l3b5-a0001c1

hydra:
  run:
    dir: ./arsq_rlb/exp_local/arsq_pixel_rlbench/${now:%Y}_${now:%m%d}_${now:%H%M}_${now:%S}
